<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 流式问答 Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #f7f8fa;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 820px;
            height: 92vh;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部标题栏 */
        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid #eef0f3;
            background: #ffffff;
        }

        .chat-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
        }

        .chat-header p {
            font-size: 13px;
            color: #6b7280;
            margin-top: 2px;
        }

        /* 消息区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafbfc;
        }

        /* 自定义滚动条 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        /* 消息气泡通用 */
        .message {
            display: flex;
            max-width: 75%;
            line-height: 1.6;
            font-size: 15px;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            justify-content: flex-end;
        }

        .message.ai {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 16px;
            border-radius: 18px;
            white-space: pre-wrap;
        }

        .user .bubble {
            background: #2563eb;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .ai .bubble {
            background: #ffffff;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 4px;
        }

        /* 打字光标 */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background: #6b7280;
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 底部输入区 */
        .chat-input-area {
            padding: 16px 24px 20px;
            border-top: 1px solid #eef0f3;
            background: #ffffff;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            resize: none;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            min-height: 44px;
            max-height: 120px;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: #2563eb;
        }

        button {
            height: 44px;
            padding: 0 22px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        /* 响应式适配 */
        @media (max-width: 640px) {
            .chat-wrapper {
                height: 100vh;
                border-radius: 0;
            }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <h2>AI 智能助手</h2>
            <p>基于 DeepSeek 大模型 · 流式实时输出</p>
        </div>

        <div class="chat-messages" id="messagesBox">
            <div class="message ai">
                <div class="bubble">你好！我是AI助手，有什么可以帮你的吗？</div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-row">
                <textarea id="inputBox" placeholder="输入你的问题，按回车发送"></textarea>
                <button id="sendBtn" onclick="sendQuery()">发送</button>
            </div>
        </div>
    </div>

    <script>
        const inputBox = document.getElementById('inputBox');
        const messagesBox = document.getElementById('messagesBox');
        const sendBtn = document.getElementById('sendBtn');
        let isStreaming = false;

        // 回车发送
        inputBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendQuery();
            }
        });

        function addMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;
            msgDiv.appendChild(bubble);
            messagesBox.appendChild(msgDiv);
            scrollToBottom();
            return bubble;
        }

        function scrollToBottom() {
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        async function sendQuery() {
            const text = inputBox.value.trim();
            if (!text || isStreaming) return;

            isStreaming = true;
            sendBtn.disabled = true;
            addMessage('user', text);
            inputBox.value = '';

            const aiBubble = addMessage('ai', '');
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            aiBubble.appendChild(cursor);

            try {
                const res = await fetch("/stream", {
                    method: "POST",
                    headers: {"Content-Type": "application/x-www-form-urlencoded"},
                    body: `user_input=${encodeURIComponent(text)}`
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n\n").filter(line => line);
                    for (let line of lines) {
                        if (line.startsWith("data: ")) {
                            const dataStr = line.slice(6);
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.choices && data.choices[0].delta.content) {
                                    cursor.remove();
                                    aiBubble.innerText += data.choices[0].delta.content;
                                    aiBubble.appendChild(cursor);
                                    scrollToBottom();
                                }
                            } catch(e) {}
                        }
                    }
                }
            } catch (err) {
                aiBubble.innerText = "请求出错，请稍后重试";
            } finally {
                cursor.remove();
                isStreaming = false;
                sendBtn.disabled = false;
                inputBox.focus();
            }
        }

        inputBox.focus();
    </script>
</body>
</html>
